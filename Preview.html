<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0G UI Toolkit - Live Preview</title>

    <script src="https://cdn.jsdelivr.net/gh/RedRavenLabs/OGLabsCannes@main/styler7.js"></script>

    <style>
        body {
            margin: 0;
            padding: 40px 24px 60px;
            min-height: 100vh;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .page-header h1 {
            margin: 0 0 8px;
            font-size: 1.8rem;
            color: var(--text-main);
        }
        .page-header p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .toggle-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }
        .toggle-container button {
            font-size: 0.8rem;
            padding: 8px 16px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        .tab-btn {
            font-size: 0.85rem;
            padding: 10px 20px;
            border-radius: 12px;
            border: none;
            background: var(--bg-base);
            color: var(--text-muted);
            font-weight: 700;
            font-family: var(--font-primary, sans-serif);
            cursor: pointer;
            box-shadow: var(--shadow-flat);
            transition: box-shadow 0.2s ease, color 0.2s ease, background-color 0.3s ease;
        }
        .tab-btn:active { box-shadow: var(--shadow-pressed); }
        .tab-btn.active {
            color: var(--color-primary);
            box-shadow: var(--shadow-pressed);
        }

        /* Preview frame */
        .preview-container {
            display: flex;
            justify-content: center;
        }
        .preview-frame {
            width: 100%;
            max-width: 820px;
            background: var(--bg-base);
            border-radius: 24px;
            box-shadow: var(--shadow-flat);
            overflow: hidden;
            transition: background-color 0.3s ease;
        }
        .frame-topbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 20px;
            border-bottom: 1px solid rgba(128, 128, 128, 0.1);
        }
        .frame-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .frame-dot.red { background: #ef4444; }
        .frame-dot.yellow { background: #f59e0b; }
        .frame-dot.green { background: #22c55e; }
        .frame-label {
            margin-left: auto;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            font-family: var(--font-code, monospace);
        }

        .preview-frame iframe {
            width: 100%;
            height: 700px;
            border: none;
            display: block;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.78rem;
            color: var(--text-muted);
        }
        .footer a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .preview-frame iframe { height: 600px; }
            .page-header h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="toggle-container">
        <button id="theme-toggle-btn" onclick="toggleTheme()">🌙 Dark</button>
    </div>

    <div class="page-header">
        <img class="og-logo" alt="0G" style="height: 40px; margin-bottom: 16px;" />
        <h1>UI Toolkit Preview</h1>
        <p>Neumorphic design system for 0G — light &amp; dark mode ready.</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showPreview('node', this)">Node Operator</button>
        <button class="tab-btn" onclick="showPreview('dashboard', this)">Dashboard</button>
        <button class="tab-btn" onclick="showPreview('wallet', this)">Wallet</button>
    </div>

    <div class="preview-container">
        <div class="preview-frame">
            <div class="frame-topbar">
                <div class="frame-dot red"></div>
                <div class="frame-dot yellow"></div>
                <div class="frame-dot green"></div>
                <span class="frame-label" id="frame-filename">Preview - Node Operator.html</span>
            </div>
            <iframe id="preview-iframe" src="Preview%20-%20Node%20Operator.html"></iframe>
        </div>
    </div>

    <div class="footer">
        Built with the <a href="https://github.com/RedRavenLabs/OGLabsCannes">0G UI Toolkit</a> — styler7.js
    </div>

    <script>
        var previews = {
            node:      { src: 'Preview%20-%20Node%20Operator.html', label: 'Preview - Node Operator.html' },
            dashboard: { src: 'Preview-Dashboard.html',             label: 'Preview-Dashboard.html' },
            wallet:    { src: 'Preview-Wallet.html',                label: 'Preview-Wallet.html' }
        };

        function showPreview(key, btn) {
            var iframe = document.getElementById('preview-iframe');
            iframe.src = previews[key].src;
            document.getElementById('frame-filename').textContent = previews[key].label;

            document.querySelectorAll('.tab-btn').forEach(function(b) {
                b.classList.remove('active');
            });
            btn.classList.add('active');
        }

        function toggleTheme() {
            var html = document.documentElement;
            var btn = document.getElementById('theme-toggle-btn');

            var currentTheme = html.getAttribute('data-0g-theme');
            if (!currentTheme) {
                currentTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }

            var newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-0g-theme', newTheme);
            btn.innerText = newTheme === 'light' ? '🌙 Dark' : '☀️ Light';
        }
    </script>

</body>
</html>
